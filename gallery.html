<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="再野文化工作室作品图库" />
    <title>作品图库 | 再野文化工作室</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="gallery.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="返回再野文化工作室首页">
        <span class="brand-mark">再野文化工作室</span>
        <span class="brand-line">ZAIYE CULTURE</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html#work">作品</a>
        <a href="index.html#scope">服务</a>
        <a href="index.html#lab">Prompt Vault</a>
        <a href="index.html#contact">联系</a>
      </nav>
    </header>

    <main>
      <section class="gallery-hero">
        <p class="eyebrow" data-gallery-kicker>作品图库</p>
        <h1 data-gallery-title>全部作品</h1>
        <p class="hero-copy" data-gallery-copy>
          从简历作品集中整理出的图片素材。后续可以继续按项目拆成更完整的详情页。
        </p>
      </section>

      <section class="work gallery-page">
        <div class="work-browser" aria-label="作品分类入口">
          <div class="filter-block">
            <p class="filter-label">项目类型</p>
            <div class="filter-row">
              <a class="filter-chip" href="gallery.html">全部</a>
              <a class="filter-chip" href="gallery.html?project=feature">电影 / 网大</a>
              <a class="filter-chip" href="gallery.html?project=series">剧集 / 短剧</a>
              <a class="filter-chip" href="gallery.html?project=variety">综艺 / 晚会</a>
              <a class="filter-chip" href="gallery.html?project=stage">舞台剧</a>
              <a class="filter-chip" href="gallery.html?project=promo">广告 / 宣传片</a>
              <a class="filter-chip" href="gallery.html?project=immersive">实景 / 沉浸</a>
            </div>
          </div>
          <div class="filter-block">
            <p class="filter-label">图片类型</p>
            <div class="filter-row">
              <a class="filter-chip" href="gallery.html">全部</a>
              <a class="filter-chip" href="gallery.html?type=atmosphere">气氛图</a>
              <a class="filter-chip" href="gallery.html?type=dressing">陈设图</a>
              <a class="filter-chip" href="gallery.html?type=model">置景模型</a>
              <a class="filter-chip" href="gallery.html?type=prop">道具 / 资产</a>
              <a class="filter-chip" href="gallery.html?type=vfx">特效设计</a>
              <a class="filter-chip" href="gallery.html?type=handmade">手绘戏用</a>
              <a class="filter-chip" href="gallery.html?type=graphic">戏用平面</a>
              <a class="filter-chip" href="gallery.html?type=character">角色三视图</a>
              <a class="filter-chip" href="gallery.html?type=storyboard">分镜</a>
              <a class="filter-chip" href="gallery.html?type=lineart">线稿场景</a>
            </div>
          </div>
        </div>

        <div class="gallery-grid" data-gallery-grid></div>
        <p class="empty-state" data-gallery-empty hidden>这个分类下暂时没有展示项</p>
      </section>
    </main>
  </body>
</html>
