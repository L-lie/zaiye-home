<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="再野文化工作室 Canvas - 用来整理提示词、参考图、生成结果和项目备注的无限画布。"
    />
    <title>Canvas | 再野文化工作室</title>
    <link rel="icon" href="assets/site-logo.png" type="image/png" />
    <script src="theme.js?v=20260723c"></script>
    <link rel="stylesheet" href="canvas.css?v=20260723c" />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <header class="canvas-header">
      <a class="brand" href="index.html" aria-label="返回再野文化工作室首页">
        <img class="brand-logo" src="assets/site-logo.png" alt="" width="38" height="38" />
        <span class="brand-copy">
          <span class="brand-mark">再野文化工作室</span>
          <span class="brand-line">ZAIYE CANVAS</span>
        </span>
      </a>
      <div class="header-actions" id="homeActions">
        <button id="newBoard" type="button">新建画布</button>
        <button id="importBoardHome" type="button">导入画布</button>
        <a href="prompt-vault.html">Prompt Vault</a>
        <a href="index.html">回到官网</a>
      </div>
      <div class="header-actions" id="editorActions" hidden>
        <button id="backToBoards" type="button">全部画布</button>
        <button id="saveBoard" type="button">保存</button>
        <button id="exportBoard" type="button">导出</button>
        <button id="shareBoard" type="button">分享</button>
        <button id="importBoard" type="button">导入</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
        <a href="prompt-vault.html">Prompt Vault</a>
        <a href="index.html">回到官网</a>
      </div>
    </header>

    <main class="canvas-access" id="canvasAccess" hidden>
      <section class="canvas-access-card">
        <div>
          <p class="eyebrow">私人内容</p>
          <h1>打开 Canvas</h1>
          <p>输入密钥后才能查看和编辑你的画布库</p>
        </div>
        <form class="canvas-unlock-form" id="canvasUnlockForm" autocomplete="on">
          <input
            class="credential-username"
            name="username"
            type="text"
            value="zaiye-canvas-owner"
            autocomplete="username"
            tabindex="-1"
            aria-hidden="true"
            readonly
          />
          <label for="canvasUnlockKey">私人解锁密钥</label>
          <div class="canvas-unlock-row">
            <input id="canvasUnlockKey" name="password" type="password" autocomplete="current-password" required />
            <button type="submit">解锁</button>
          </div>
          <p class="canvas-form-message" id="canvasUnlockMessage" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <main class="canvas-home" id="canvasHome">
      <section class="canvas-home-heading">
        <div>
          <p class="eyebrow">再野创作空间</p>
          <h1>画布</h1>
          <p>整理参考图、Prompt、手写草图和项目判断</p>
        </div>
        <button class="new-board-button" id="newBoardHero" type="button">新建画布</button>
      </section>

      <section class="board-library" aria-labelledby="board-library-title">
        <div class="library-heading">
          <h2 id="board-library-title">最近画布</h2>
          <span id="boardCount"></span>
        </div>
        <div class="board-grid" id="boardGrid"></div>
        <div class="board-empty" id="boardEmpty" hidden>
          <strong>还没有画布</strong>
          <p>新建一张画布，把参考图、文字和手绘内容放进去</p>
          <button id="newBoardEmpty" type="button">新建画布</button>
        </div>
      </section>
    </main>

    <main class="workspace" id="canvasWorkspace" hidden>
      <aside class="side-panel" aria-label="画布工具">
        <section class="tool-block">
          <p class="eyebrow">项目</p>
          <label>
            画布名称
            <input id="boardTitle" value="未命名项目" />
          </label>
          <label>
            项目备注
            <textarea id="boardNote" rows="4" placeholder="例如：某剧某场景的视觉方向、生成目标、需要避开的内容"></textarea>
          </label>
        </section>

        <section class="tool-block">
          <p class="eyebrow">添加</p>
          <div class="button-grid">
            <button id="addPrompt" type="button">Prompt 卡</button>
            <button id="addNote" type="button">文字备注</button>
            <button id="addFrame" type="button">分组框</button>
            <button id="addImage" type="button">图片</button>
          </div>
          <input id="imageFile" type="file" accept="image/*" multiple hidden />
        </section>

        <section class="tool-block">
          <p class="eyebrow">当前条目</p>
          <label>
            标题
            <input id="itemTitle" placeholder="选中画布上的条目后编辑" disabled />
          </label>
          <label>
            内容
            <textarea id="itemBody" rows="7" placeholder="Prompt、备注、图片说明" disabled></textarea>
          </label>
          <div class="button-grid">
            <button id="duplicateItem" type="button" disabled>复制</button>
            <button id="deleteItem" type="button" disabled>删除</button>
          </div>
        </section>

        <section class="tool-block small">
          <p class="eyebrow">视图</p>
          <div class="button-grid">
            <button id="zoomOut" type="button">缩小</button>
            <button id="zoomIn" type="button">放大</button>
            <button id="resetView" type="button">回到中心</button>
            <button id="clearBoard" type="button">清空</button>
          </div>
          <p class="hint">拖动空白处移动画布，滚轮缩放。图片可以拖入或直接粘贴，文字也可直接粘贴成备注。</p>
        </section>
      </aside>

      <section class="stage-wrap" aria-label="无限画布">
        <div class="ink-toolbar" role="toolbar" aria-label="画笔工具">
          <div class="tool-segment" aria-label="操作模式">
            <button class="ink-tool active" type="button" data-tool="select" aria-pressed="true">选择</button>
            <button class="ink-tool" type="button" data-tool="zoom" aria-pressed="false">缩放</button>
            <button class="ink-tool" type="button" data-tool="pen" aria-pressed="false">画笔</button>
            <button class="ink-tool" type="button" data-tool="eraser" aria-pressed="false">橡皮</button>
            <button class="ink-tool" type="button" data-tool="lasso" aria-pressed="false">套索</button>
            <button class="ink-tool" type="button" data-tool="rect-lasso" aria-pressed="false">方选</button>
            <button class="ink-tool" type="button" data-tool="heal" aria-pressed="false">修复</button>
            <button class="ink-tool" type="button" data-tool="smudge" aria-pressed="false">涂抹</button>
          </div>
          <div class="color-swatches" aria-label="画笔颜色">
            <button class="color-swatch active" type="button" data-color="#18231f" style="--swatch:#18231f" aria-label="深绿色"></button>
            <button class="color-swatch" type="button" data-color="#b85b5b" style="--swatch:#b85b5b" aria-label="红色"></button>
            <button class="color-swatch" type="button" data-color="#2f6f9f" style="--swatch:#2f6f9f" aria-label="蓝色"></button>
            <button class="color-swatch" type="button" data-color="#f4efe6" style="--swatch:#f4efe6" aria-label="白色"></button>
          </div>
          <label class="stroke-size">粗细 <input id="strokeWidth" type="range" min="1" max="24" value="5" /></label>
          <button id="undoInk" type="button">撤销笔迹</button>
        </div>
        <div class="stage-toolbar">
          <span id="statusText">已保存到本机</span>
          <span id="zoomText">100%</span>
        </div>
        <div id="viewport" class="viewport">
          <div id="canvasGrid" class="canvas-grid" aria-hidden="true"></div>
          <div id="brushCursor" class="brush-cursor" hidden></div>
          <div id="board" class="board">
            <svg id="inkLayer" class="ink-layer" viewBox="0 0 6000 4200" aria-label="手写与绘画笔迹"></svg>
            <div id="itemLayer" class="item-layer"></div>
          </div>
        </div>
        <div class="tool-menu" id="toolMenu" hidden>
          <button type="button" data-menu-tool="pen">画笔</button>
          <button type="button" data-menu-tool="eraser">橡皮</button>
          <button type="button" data-menu-tool="lasso">套索</button>
          <button type="button" data-menu-tool="rect-lasso">方形套索</button>
          <button type="button" data-menu-tool="heal">污点修复</button>
          <button type="button" data-menu-tool="smudge">涂抹</button>
          <hr />
          <button type="button" data-width="2">细笔</button>
          <button type="button" data-width="6">中笔</button>
          <button type="button" data-width="14">粗笔</button>
        </div>
      </section>
    </main>

    <template id="itemTemplate">
      <article class="canvas-item" tabindex="0">
        <div class="item-head">
          <strong></strong>
          <span></span>
        </div>
        <div class="item-body"></div>
      </article>
    </template>

    <template id="boardCardTemplate">
      <article class="board-card">
        <button class="board-card-open" type="button">
          <span class="board-preview"></span>
          <span class="board-card-copy">
            <strong></strong>
            <small></small>
          </span>
        </button>
        <div class="board-card-actions">
          <button class="rename-board" type="button">重命名</button>
          <button class="delete-board" type="button">删除</button>
        </div>
      </article>
    </template>

    <input id="sharedImportFile" type="file" accept="application/json,.json" hidden />

    <script src="canvas.js?v=20260723c"></script>
  </body>
</html>
