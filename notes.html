<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="再野文化工作室学习笔记入口" />
    <meta name="robots" content="noindex, nofollow" />
    <title>学习笔记 | 再野文化工作室</title>
    <link rel="icon" href="assets/site-logo.png" type="image/png" />
    <script src="theme.js?v=20260723b"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="notes.css?v=20260723b" />
    <link rel="stylesheet" href="theme.css" />
    <script src="notes.js?v=20260723b" defer></script>
  </head>
  <body>
    <header class="site-header notes-index-header">
      <a class="brand" href="index.html" aria-label="返回再野文化工作室首页">
        <img class="brand-logo" src="assets/site-logo.png" alt="" width="38" height="38" />
        <span class="brand-copy">
          <span class="brand-mark">再野文化工作室</span>
          <span class="brand-line">ZAIYE CULTURE</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="gallery.html">作品</a>
        <a href="canvas.html">Canvas</a>
        <a href="notes.html" aria-current="page">学习笔记</a>
        <a href="prompt-vault.html">Prompt Vault</a>
        <a href="tools/creative-vault/index.html">Creative Vault / 创意资产库</a>
        <a href="tools/overlap-slicer/index.html">重叠切图</a>
        <a href="index.html#contact">联系</a>
      </nav>
    </header>

    <main class="notes-index">
      <header class="notes-index-heading">
        <h1>学习笔记</h1>
        <p>私人学习记录</p>
      </header>

      <section class="notes-gate" id="notesGate" aria-labelledby="notes-gate-title">
        <div>
          <p class="eyebrow">私人内容</p>
          <h2 id="notes-gate-title">打开学习笔记</h2>
          <p>输入密钥后才能查看笔记本列表</p>
        </div>
        <form class="notes-unlock-form" id="notesUnlockForm" autocomplete="on">
          <input
            class="credential-username"
            name="username"
            type="text"
            value="zaiye-notes-owner"
            autocomplete="username"
            tabindex="-1"
            aria-hidden="true"
            readonly
          />
          <label for="notesUnlockKey">私人解锁密钥</label>
          <div class="notes-unlock-row">
            <input
              id="notesUnlockKey"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
            <button class="button primary" type="submit">解锁</button>
          </div>
          <p class="notes-form-message" id="notesUnlockMessage" aria-live="polite"></p>
        </form>
      </section>

      <section class="notebook-list" id="publicNotebookList" aria-labelledby="public-notebook-list-title" hidden>
        <div class="notebook-list-heading">
          <h2 id="public-notebook-list-title">公开笔记本</h2>
        </div>
        <div class="notebook-grid" id="publicNotebookGrid"></div>
      </section>

      <section class="notebook-list" aria-labelledby="local-notebook-list-title">
        <div class="notebook-list-heading">
          <h2 id="local-notebook-list-title">本机笔记</h2>
        </div>
        <div class="notebook-grid">
          <a class="notebook-card" href="blender-notes.html#local">
            <div class="notebook-card-header">
              <span class="notebook-card-label">仅保存在本机</span>
            </div>
            <h3>新建自己的学习笔记</h3>
            <p>不需要密钥，内容只保存在当前浏览器</p>
            <span class="notebook-card-arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </section>

      <section class="notebook-list private-notebook-list" id="privateNotebookList" aria-labelledby="private-notebook-list-title" hidden>
        <div class="notebook-list-heading">
          <div>
            <p class="eyebrow">私人笔记库</p>
            <h2 id="private-notebook-list-title">全部笔记本</h2>
          </div>
          <button type="button" id="lockNotes">锁定</button>
        </div>
        <p class="publish-note">公开状态会在下一次更新并发布笔记时同步到上一层</p>
        <div class="notebook-grid" id="privateNotebookGrid"></div>
        <p class="notes-form-message shelf-message" id="shelfMessage" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
